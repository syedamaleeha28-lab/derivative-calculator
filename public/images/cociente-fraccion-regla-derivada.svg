<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="q-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#q-bg)" rx="16"/>
  <text x="400" y="48" text-anchor="middle" fill="#ede9fe" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Regla del cociente</text>
  <text x="400" y="78" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Cociente u/v: denominador al cuadrado</text>
  <line x1="320" y1="195" x2="480" y2="195" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <text x="400" y="180" text-anchor="middle" fill="#f5f3ff" font-family="Georgia,serif" font-size="34">u</text>
  <text x="400" y="240" text-anchor="middle" fill="#ddd6fe" font-family="Georgia,serif" font-size="34">v</text>
  <rect x="110" y="300" width="580" height="120" rx="14" fill="#0f172a" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="345" text-anchor="middle" fill="#faf5ff" font-family="Georgia,serif" font-size="18">(u/v)' = (u'v - u v') / v^2</text>
  <text x="400" y="385" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="14">Numerador: producto cruzado con signo menos</text>
</svg>
