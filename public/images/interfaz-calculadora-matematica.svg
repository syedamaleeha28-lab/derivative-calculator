<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <filter id="glow-panel">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad3)" rx="16" />
  
  <!-- Interface panel -->
  <rect x="150" y="80" width="500" height="340" rx="20" fill="#07111f" stroke="#a855f7" stroke-width="2" filter="url(#glow-panel)" />
  
  <!-- Header -->
  <rect x="150" y="80" width="500" height="50" rx="20" fill="#1e293b" />
  <circle cx="180" cy="105" r="6" fill="#ef4444" />
  <circle cx="205" cy="105" r="6" fill="#facc15" />
  <circle cx="230" cy="105" r="6" fill="#22c55e" />
  
  <!-- Input field -->
  <rect x="200" y="160" width="400" height="60" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
  <text x="220" y="198" fill="#e2e8f0" font-family="monospace" font-size="24">d/dx [ sin(x² + 1) ]</text>
  
  <!-- Buttons -->
  <rect x="200" y="250" width="120" height="40" rx="8" fill="#a855f7" />
  <text x="235" y="276" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="bold">Calcular</text>
  
  <!-- Output -->
  <rect x="200" y="320" width="400" height="60" rx="8" fill="#111827" stroke="#22c55e" stroke-width="1" />
  <text x="220" y="358" fill="#22c55e" font-family="monospace" font-size="22">= 2x · cos(x² + 1)</text>
</svg>
