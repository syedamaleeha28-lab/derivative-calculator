<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="curve-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16" />
  
  <!-- Grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0,100 L800,100 M0,200 L800,200 M0,300 L800,300 M0,400 L800,400" />
    <path d="M100,0 L100,500 M200,0 L200,500 M300,0 L300,500 M400,0 L400,500 M500,0 L500,500 M600,0 L600,500 M700,0 L700,500" />
  </g>
  
  <!-- Axes -->
  <g stroke="#ffffff" stroke-opacity="0.2" stroke-width="2">
    <line x1="0" y1="350" x2="800" y2="350" />
    <line x1="150" y1="0" x2="150" y2="500" />
  </g>

  <!-- Curve f(x) -->
  <path d="M 50,450 Q 250,400 400,250 T 750,50" fill="none" stroke="url(#curve-grad)" stroke-width="4" filter="url(#glow)" />
  <text x="680" y="80" fill="#ec4899" font-family="sans-serif" font-size="24" font-weight="bold">f(x)</text>

  <!-- Tangent Line -->
  <line x1="200" y1="400" x2="600" y2="100" stroke="#38bdf8" stroke-width="3" stroke-dasharray="8,4" filter="url(#glow)" />
  <text x="500" y="150" fill="#38bdf8" font-family="sans-serif" font-size="20">Pendiente = f'(x)</text>

  <!-- Point -->
  <circle cx="400" cy="250" r="6" fill="#ffffff" />
  <circle cx="400" cy="250" r="12" fill="none" stroke="#38bdf8" stroke-width="2" />
  <line x1="400" y1="250" x2="400" y2="350" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="4,4" />
  <line x1="150" y1="250" x2="400" y2="250" stroke="#ffffff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="4,4" />
  
  <text x="390" y="380" fill="#94a3b8" font-family="sans-serif" font-size="18">x</text>
  <text x="100" y="255" fill="#94a3b8" font-family="sans-serif" font-size="18">f(x)</text>
</svg>
