<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#2e1065" />
    </linearGradient>
    <filter id="glow-3d">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad4)" rx="16" />
  
  <!-- 3D Axes -->
  <g stroke="#ffffff" stroke-opacity="0.3" stroke-width="2">
    <line x1="400" y1="350" x2="400" y2="50" /> <!-- Z -->
    <line x1="400" y1="350" x2="200" y2="450" /> <!-- X -->
    <line x1="400" y1="350" x2="650" y2="450" /> <!-- Y -->
  </g>
  <text x="180" y="470" fill="#94a3b8" font-family="sans-serif" font-size="16">x</text>
  <text x="670" y="470" fill="#94a3b8" font-family="sans-serif" font-size="16">y</text>
  <text x="380" y="40" fill="#94a3b8" font-family="sans-serif" font-size="16">z = f(x,y)</text>

  <!-- Wireframe Surface -->
  <g stroke="#a855f7" fill="none" stroke-width="1.5" stroke-opacity="0.6">
    <path d="M 250,350 Q 350,250 450,280 T 600,200" />
    <path d="M 270,380 Q 370,280 470,310 T 620,230" />
    <path d="M 290,410 Q 390,310 490,340 T 640,260" />
    
    <path d="M 250,350 Q 270,380 290,410" />
    <path d="M 350,250 Q 370,280 390,310" />
    <path d="M 450,280 Q 470,310 490,340" />
    <path d="M 600,200 Q 620,230 640,260" />
  </g>
  
  <!-- Point and Tangent Vectors -->
  <circle cx="450" cy="280" r="5" fill="#ffffff" filter="url(#glow-3d)" />
  <line x1="450" y1="280" x2="550" y2="250" stroke="#38bdf8" stroke-width="3" filter="url(#glow-3d)" />
  <line x1="450" y1="280" x2="400" y2="380" stroke="#ec4899" stroke-width="3" filter="url(#glow-3d)" />
  
  <text x="560" y="240" fill="#38bdf8" font-family="sans-serif" font-size="18">∂f/∂y</text>
  <text x="350" y="390" fill="#ec4899" font-family="sans-serif" font-size="18">∂f/∂x</text>
</svg>
