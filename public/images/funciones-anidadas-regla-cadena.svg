<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="c-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#c-bg)" rx="16"/>
  <text x="400" y="48" text-anchor="middle" fill="#e9d5ff" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Funciones compuestas</text>
  <text x="400" y="78" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Exterior f, interior g: multiplica f'(g) por g'</text>
  <circle cx="400" cy="260" r="140" fill="none" stroke="#6d28d9" stroke-width="3" stroke-opacity="0.5"/>
  <circle cx="400" cy="260" r="95" fill="none" stroke="#8b5cf6" stroke-width="3"/>
  <circle cx="400" cy="260" r="48" fill="#8b5cf6" fill-opacity="0.25" stroke="#c4b5fd" stroke-width="2"/>
  <text x="400" y="218" text-anchor="middle" fill="#ede9fe" font-family="system-ui,sans-serif" font-size="15" font-weight="600">f</text>
  <text x="400" y="268" text-anchor="middle" fill="#ddd6fe" font-family="system-ui,sans-serif" font-size="14">g(x)</text>
  <text x="400" y="305" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="13">interior</text>
  <rect x="180" y="400" width="440" height="56" rx="12" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
  <text x="400" y="435" text-anchor="middle" fill="#f5f3ff" font-family="Georgia,serif" font-size="18">[f(g(x))]' = f'(g(x)) g'(x)</text>
</svg>
