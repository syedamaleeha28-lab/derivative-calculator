<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="pr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#pr-bg)" rx="16"/>
  <text x="400" y="50" text-anchor="middle" fill="#ede9fe" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Regla del producto</text>
  <text x="400" y="80" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Dos funciones multiplicadas: (u v)'</text>
  <rect x="100" y="150" width="260" height="120" rx="16" fill="#8b5cf6" fill-opacity="0.15" stroke="#a78bfa" stroke-width="2"/>
  <text x="230" y="205" text-anchor="middle" fill="#ddd6fe" font-family="Georgia,serif" font-size="32">u</text>
  <text x="230" y="240" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="14">primera funcion</text>
  <text x="400" y="225" text-anchor="middle" fill="#f5f3ff" font-family="Georgia,serif" font-size="28">*</text>
  <rect x="440" y="150" width="260" height="120" rx="16" fill="#7c3aed" fill-opacity="0.2" stroke="#c4b5fd" stroke-width="2"/>
  <text x="570" y="205" text-anchor="middle" fill="#ddd6fe" font-family="Georgia,serif" font-size="32">v</text>
  <text x="570" y="240" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="14">segunda funcion</text>
  <rect x="140" y="320" width="520" height="100" rx="14" fill="#020617" fill-opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="365" text-anchor="middle" fill="#faf5ff" font-family="Georgia,serif" font-size="22">(uv)' = u'v + u v'</text>
  <text x="400" y="398" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="14">Deriva una, deja la otra; luego invierte</text>
</svg>
